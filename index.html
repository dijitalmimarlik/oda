<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>3D Sanal Tur - Emlak</title>
  <!-- Tarayıcının otomatik favicon.ico isteğinin 404 vermesini önlemek için boş bir ikon tanımlıyoruz -->
  <link rel="icon" href="data:," />

  <style>
    /* Sayfa ve canvas tam ekran, kaydırma çubukları olmasın */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
    }

    canvas {
      display: block;
    }

    /* İlk kullanıcı etkileşimini almak için tam ekran kaplayan başlangıç katmanı */
    #baslangicKatmani {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 999;
      cursor: pointer;
      user-select: none;
    }

    #baslangicKatmani h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    #baslangicKatmani p {
      font-size: 14px;
      opacity: 0.8;
      max-width: 80%;
    }

    /* Mobil hareket için ekranın alt kısmına basılı tutma alanı ipucu */
    #kontrolBilgisi {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      background: rgba(0,0,0,0.4);
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 12px;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- Kullanıcı tıklayana/dokunana kadar gösterilen katman: ses politikası için ilk etkileşimi alır -->
  <div id="baslangicKatmani">
    <h1>Sanal Tura Hoş Geldiniz</h1>
    <p>
      Başlamak için tıklayın / dokunun.<br />
      PC: Fareyi basılı tutup sürükleyerek bakış açınızı değiştirin, WASD veya yön tuşları ile yürüyün, Space ile yükselin, Shift ile alçalın.<br />
      Mobil: Ekrana basılı tutarak baktığınız yöne ilerleyin.
    </p>
  </div>

  <div id="kontrolBilgisi">Basılı tut ve ilerle</div>

  <!-- ============ THREE.JS r128 ve EK KÜTÜPHANELER (CDN) ============ -->
  <!-- Ana Three.js kütüphanesi -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <!-- GLTF modelleri yüklemek için -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <!-- NOT: Fare ile bakış artık OrbitControls yerine app.js içindeki kendi
       "tıkla ve sürükle" (mousedown + mousemove) sistemimizle sağlanıyor. -->

  <!-- Kütüphanelerin gerçekten yüklenip yüklenmediğini erkenden kontrol et.
       Yüklenmediyse kullanıcıya konsola bakmadan görebileceği bir hata göster. -->
  <script>
    window.addEventListener("error", function (olay) {
      const katman = document.getElementById("baslangicKatmani");
      if (katman) {
        katman.style.display = "flex"; // Hata varsa katmanı tekrar göster
        katman.innerHTML =
          "<h1>Bir hata oluştu</h1><p>" +
          (olay.message || "Bilinmeyen hata") +
          "<br><br>Dosya: " + (olay.filename || "-") + " (satır " + (olay.lineno || "-") + ")" +
          "<br><br>Lütfen F12 ile konsolu kontrol edin ve sayfayı bir yerel sunucu üzerinden açtığınızdan emin olun (file:// ile değil).</p>";
      }
    });
  </script>

  <!-- Kendi uygulama kodumuz -->
  <script src="app.js"></script>
</body>
</html>
